<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Woordjes Oefenen</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <canvas id="confetti-canvas"></canvas>

    <header class="app-header">
      <div class="logo">Woordjes</div>
      <div class="score-box">
        <span class="star">⭐</span>
        <span id="score-display">0</span>
        <span class="score-label">punten</span>
      </div>
    </header>

    <div class="progress-wrap" aria-label="voortgang">
      <div id="progress-bar"></div>
    </div>

    <main class="card">
      <section id="menu-screen" class="screen active">
        <h1>Kies een spel</h1>
        <p class="intro">Leer Nederlandse woordjes op een speelse manier.</p>
        <div class="menu-actions">
          <button id="btn-start-guess" class="menu-btn">Raad het woord</button>
          <button id="btn-start-build" class="menu-btn menu-btn-secondary">Bouw het woord</button>
        </div>
      </section>

      <section id="guess-screen" class="screen" aria-live="polite">
        <button id="btn-abort-guess" class="abort-btn" type="button">Terug naar menu</button>
        <div class="image-wrap" id="guess-image-wrap">
          <span class="image-emoji" id="guess-emoji">🌳</span>
          <img id="guess-image" src="" alt="Woord afbeelding" />
        </div>
        <p class="question-text">Welk woord hoort bij dit plaatje?</p>
        <div id="guess-feedback" class="feedback"></div>
        <div id="guess-answers" class="answers"></div>
      </section>

      <section id="build-screen" class="screen" aria-live="polite">
        <button id="btn-abort-build" class="abort-btn" type="button">Terug naar menu</button>
        <div class="image-wrap" id="build-image-wrap">
          <span class="image-emoji" id="build-emoji">📘</span>
          <img id="build-image" src="" alt="Woord afbeelding" />
        </div>
        <p class="question-text">Sleep letters naar de vakjes en bouw het woord.</p>
        <div id="build-slots" class="slots"></div>
        <div id="build-letters" class="letters"></div>
        <div id="build-feedback" class="feedback"></div>
      </section>

      <section id="end-screen" class="screen">
        <div class="trophy">🏆</div>
        <h2 id="end-title">Super gedaan!</h2>
        <p id="end-message"></p>
        <div class="menu-actions">
          <button id="btn-play-again" class="menu-btn">Nog een keer</button>
          <button id="btn-back-menu" class="menu-btn menu-btn-secondary">Terug naar menu</button>
        </div>
      </section>
    </main>

    <script type="module" src="./assets/js/main.js"></script>
  </body>
</html>
