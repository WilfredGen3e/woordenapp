<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Woordjes Oefenen 🌟</title>

  <!--
  ╔══════════════════════════════════════════════════════════╗
  ║   AFBEELDINGEN VERVANGEN                                 ║
  ║                                                          ║
  ║   Elke vraag heeft een "emoji" veld (voor de weergave)   ║
  ║   én een optioneel "image" veld.                         ║
  ║                                                          ║
  ║   Om een echte afbeelding te gebruiken:                  ║
  ║   1. Maak een map "images" naast dit HTML-bestand        ║
  ║   2. Voeg je afbeelding toe, bijv. "kat.png"             ║
  ║   3. Zet bij het woord: image: "images/kat.png"          ║
  ║   4. De app gebruikt dan automatisch die afbeelding      ║
  ║                                                          ║
  ║   Zolang er geen "image" is, wordt de emoji getoond.     ║
  ╚══════════════════════════════════════════════════════════╝
  -->

  <style>
    /* ── Variabelen & Reset ── */
    :root {
      --sky:    #e8f4fd;
      --sun:    #ffd166;
      --coral:  #ff6b6b;
      --mint:   #06d6a0;
      --blue:   #118ab2;
      --purple: #c77dff;
      --dark:   #2d3a4a;
      --white:  #ffffff;
      --radius: 24px;
      --shadow: 0 8px 32px rgba(0,0,0,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--sky);
      background-image:
        radial-gradient(circle at 15% 20%, #ffd16655 0%, transparent 45%),
        radial-gradient(circle at 85% 75%, #c77dff33 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, #06d6a022 0%, transparent 60%);
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Nunito', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 40px;
      color: var(--dark);
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 680px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--coral), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .score-box {
      background: var(--white);
      border-radius: 50px;
      padding: 8px 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.2rem;
      font-weight: 800;
    }

    .score-box .star { font-size: 1.4rem; }
    #score-display { color: var(--coral); }

    /* ── Voortgangsbalk ── */
    .progress-wrap {
      width: 100%;
      max-width: 680px;
      height: 12px;
      background: #d0e8f8;
      border-radius: 50px;
      margin-bottom: 22px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--mint), var(--blue));
      border-radius: 50px;
      transition: width .6s cubic-bezier(.34,1.56,.64,1);
      width: 0%;
    }

    /* ── Kaart ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 680px;
      padding: 32px 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Afbeelding / Emoji ── */
    .image-wrap {
      width: 200px;
      height: 200px;
      border-radius: 20px;
      background: linear-gradient(135deg, #f0f9ff, #e0f3ff);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(17,138,178,.15);
      position: relative;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
    }

    .image-emoji {
      font-size: 7rem;
      line-height: 1;
      user-select: none;
    }

    /* ── Vraag-tekst ── */
    .question-text {
      font-size: 1.45rem;
      font-weight: 700;
      text-align: center;
      color: var(--dark);
      line-height: 1.4;
    }

    /* ── Antwoordknoppen ── */
    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
    }

    .answer-btn {
      padding: 20px 10px;
      border: 3px solid transparent;
      border-radius: 18px;
      background: var(--sky);
      font-family: inherit;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform .15s, background .2s, border-color .2s, box-shadow .2s;
      box-shadow: 0 4px 0 #b8d8ee;
      color: var(--dark);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .answer-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 0 #a0cce8;
      background: #d4edf9;
    }

    .answer-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #a0cce8; }

    .answer-btn.correct {
      background: #d4f7e8;
      border-color: var(--mint);
      box-shadow: 0 4px 0 #04b882;
      animation: wiggle .5s ease;
    }

    .answer-btn.wrong {
      background: #ffe0e0;
      border-color: var(--coral);
      box-shadow: 0 4px 0 #e05555;
      animation: shake .4s ease;
    }

    /* ── Feedback-banner ── */
    #feedback {
      font-size: 1.5rem;
      font-weight: 900;
      text-align: center;
      min-height: 2.2rem;
      transition: opacity .3s;
    }

    #feedback.good { color: var(--mint); }
    #feedback.bad  { color: var(--coral); }

    /* ── Confetti canvas (bovenop alles) ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Eindscore-scherm ── */
    #end-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    #end-screen .trophy { font-size: 6rem; animation: bounce 1s infinite alternate; }

    #end-screen h2 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--coral);
    }

    #end-screen p {
      font-size: 1.3rem;
      color: var(--dark);
    }

    .restart-btn {
      margin-top: 10px;
      padding: 18px 48px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--coral), var(--purple));
      color: var(--white);
      font-family: inherit;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 #a040cc;
      transition: transform .15s, box-shadow .15s;
    }

    .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #a040cc; }
    .restart-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #a040cc; }

    /* ── Animaties ── */
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      25%      { transform: rotate(-4deg) scale(1.06); }
      75%      { transform: rotate(4deg)  scale(1.06); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-6px); }
      80%     { transform: translateX(6px); }
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-16px); }
    }

    @keyframes popIn {
      0%   { transform: scale(0.7); opacity: 0; }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .card { animation: popIn .45s cubic-bezier(.34,1.56,.64,1); }

    /* ── Responsive ── */
    @media (max-width: 420px) {
      .image-emoji { font-size: 5rem; }
      .image-wrap  { width: 160px; height: 160px; }
      .answer-btn  { font-size: 1.3rem; padding: 16px 6px; }
      .question-text { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
  <div class="logo">🌈 Woordjes</div>
  <div class="score-box">
    <span class="star">⭐</span>
    <span id="score-display">0</span>
    <span style="color:#aaa; font-weight:400; font-size:.95rem;">punten</span>
  </div>
</header>

<div class="progress-wrap">
  <div id="progress-bar"></div>
</div>

<div class="card" id="game-card">

  <!-- Afbeelding -->
  <div class="image-wrap" id="image-wrap">
    <span class="image-emoji" id="word-emoji">🐱</span>
    <img id="word-img" src="" alt="" style="display:none;" />
  </div>

  <!-- Vraag -->
  <div class="question-text" id="question-text">Welk woordje hoort bij dit plaatje?</div>

  <!-- Feedback -->
  <div id="feedback"></div>

  <!-- Antwoorden -->
  <div class="answers" id="answers"></div>

  <!-- Eindscore -->
  <div id="end-screen">
    <div class="trophy">🏆</div>
    <h2 id="end-title">Super gedaan!</h2>
    <p id="end-msg"></p>
    <button class="restart-btn" onclick="startGame()">Nog een keer! 🎉</button>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   DATA – woordenlijst
   Voeg zelf woorden toe of verander de emoji / image.
   Om een echte afbeelding te gebruiken:
     image: "images/kat.png"   (relatief pad naast dit bestand)
   ═══════════════════════════════════════════════════════════ */
const WOORDEN = [
  { woord: "boom", emoji: "🌳", image: null,  hint: "groeit in het park" },
  { woord: "huis", emoji: "🏠", image: null,  hint: "woon je in" },
  { woord: "hond", emoji: "🐶", image: null,  hint: "blaft en kwispelt" },
  { woord: "maan", emoji: "🌙", image: null,  hint: "schijnt 's nachts" },
  { woord: "boek", emoji: "📚", image: null,  hint: "lees je verhalen in" },
  { woord: "roos", emoji: "🌹", image: null,  hint: "een mooie bloem" },
  { woord: "ster", emoji: "⭐", image: null,  hint: "twinkelt aan de hemel" },
  { woord: "boot", emoji: "⛵", image: null,  hint: "vaart op het water" },
  { woord: "krab", emoji: "🦀", image: null,  hint: "loopt zijwaarts" },
  { woord: "vlam", emoji: "🔥", image: null,  hint: "warm en oranje" },
  { woord: "gras", emoji: "🌿", image: null,  hint: "groen in de tuin" },
  { woord: "peer", emoji: "🍐", image: null,  hint: "lekker stuk fruit" },
];

/* ── Spelstatus ── */
const VRAGEN_PER_SPEL = 8;   // hoeveel vragen per ronde
const OPTIES          = 4;   // aantal antwoordknoppen

let score        = 0;
let vraagNummer  = 0;
let huidigeRonde = [];       // gemengde reeks voor dit spel
let huidigIndex  = 0;
let wachtOpVolgende = false;

/* ── DOM-referenties ── */
const emojiEl    = document.getElementById("word-emoji");
const imgEl      = document.getElementById("word-img");
const feedbackEl = document.getElementById("feedback");
const answersEl  = document.getElementById("answers");
const scoreEl    = document.getElementById("score-display");
const progressEl = document.getElementById("progress-bar");
const gameCard   = document.getElementById("game-card");
const endScreen  = document.getElementById("end-screen");

/* ══════════════════════════════════════════════════════════
   HULPFUNCTIES
   ══════════════════════════════════════════════════════════ */

/** Schud een array willekeurig (Fisher-Yates) */
function schud(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/** Kies N unieke willekeurige items uit een array */
function kiesN(arr, n) {
  return schud(arr).slice(0, n);
}

/** Spreek een woord uit via Web Speech API */
function spreekUit(woord) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(woord);
  utt.lang = "nl-NL";
  utt.rate = 0.85;
  utt.pitch = 1.2;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

/** Speel een toon via Web Audio API */
function speelToon(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "goed") {
      // vrolijk akkoord: C – E – G
      const noten = [523, 659, 784];
      noten.forEach((freq, i) => {
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.frequency.value = freq;
        o2.type = "sine";
        g2.gain.setValueAtTime(0.22, ctx.currentTime + i * 0.1);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.45);
        o2.start(ctx.currentTime + i * 0.1);
        o2.stop(ctx.currentTime + i * 0.1 + 0.5);
      });
    } else {
      osc.frequency.value = 280;
      osc.type = "sawtooth";
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    }
    osc.disconnect(); // eerste osc niet gebruikt bij "goed"
    gain.disconnect();
  } catch (_) { /* browser blokkeert audio zonder interactie */ }
}

/* ══════════════════════════════════════════════════════════
   CONFETTI
   ══════════════════════════════════════════════════════════ */
const canvas  = document.getElementById("confetti-canvas");
const ctx2d   = canvas.getContext("2d");
let confettiDeeltjes = [];
let confettiAnim = null;

function startConfetti() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  confettiDeeltjes = Array.from({ length: 80 }, () => ({
    x:    Math.random() * canvas.width,
    y:    Math.random() * -canvas.height * 0.5,
    w:    8 + Math.random() * 12,
    h:    5 + Math.random() * 8,
    kleur: ["#ffd166","#ff6b6b","#06d6a0","#118ab2","#c77dff","#ffffff"][Math.floor(Math.random()*6)],
    hoek: Math.random() * 360,
    snel: 2 + Math.random() * 4,
    swing: (Math.random() - 0.5) * 3,
  }));
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  tekenConfetti();
  setTimeout(stopConfetti, 2200);
}

function tekenConfetti() {
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  confettiDeeltjes.forEach(p => {
    ctx2d.save();
    ctx2d.translate(p.x, p.y);
    ctx2d.rotate(p.hoek * Math.PI / 180);
    ctx2d.fillStyle = p.kleur;
    ctx2d.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx2d.restore();
    p.y     += p.snel;
    p.x     += p.swing;
    p.hoek  += 3;
  });
  confettiAnim = requestAnimationFrame(tekenConfetti);
}

function stopConfetti() {
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
}

/* ══════════════════════════════════════════════════════════
   SPELLOGICA
   ══════════════════════════════════════════════════════════ */

function startGame() {
  score        = 0;
  huidigIndex  = 0;
  wachtOpVolgende = false;
  huidigeRonde = kiesN(WOORDEN, Math.min(VRAGEN_PER_SPEL, WOORDEN.length));

  scoreEl.textContent = "0";
  endScreen.style.display  = "none";
  document.getElementById("image-wrap").style.display = "flex";
  document.getElementById("question-text").style.display = "";
  answersEl.style.display = "";
  feedbackEl.textContent  = "";

  toonVraag();
}

function toonVraag() {
  if (huidigIndex >= huidigeRonde.length) {
    toonEindscherm();
    return;
  }

  wachtOpVolgende = false;
  feedbackEl.textContent = "";
  feedbackEl.className   = "";

  const juist = huidigeRonde[huidigIndex];

  // Voortgangsbalk
  progressEl.style.width = (huidigIndex / huidigeRonde.length * 100) + "%";

  // Afbeelding of emoji
  if (juist.image) {
    imgEl.src = juist.image;
    imgEl.alt = juist.woord;
    imgEl.style.display = "block";
    emojiEl.style.display = "none";
  } else {
    emojiEl.textContent   = juist.emoji;
    emojiEl.style.display = "block";
    imgEl.style.display   = "none";
  }

  // Spreek het woord 1× uit na korte vertraging
  setTimeout(() => spreekUit(juist.woord), 400);

  // Genereer antwoordopties: 1 juist + (OPTIES-1) willekeurige anderen
  const anderen = WOORDEN.filter(w => w.woord !== juist.woord);
  const fout    = kiesN(anderen, OPTIES - 1);
  const opties  = schud([juist, ...fout]);

  // Bouw knoppen
  answersEl.innerHTML = "";
  opties.forEach(optie => {
    const btn = document.createElement("button");
    btn.className       = "answer-btn";
    btn.textContent     = optie.woord;
    btn.dataset.correct = optie.woord === juist.woord ? "ja" : "nee";
    btn.addEventListener("click", () => checkAntwoord(btn, juist));
    answersEl.appendChild(btn);
  });
}

function checkAntwoord(geklikt, juist) {
  if (wachtOpVolgende) return;

  const isGoed = geklikt.dataset.correct === "ja";

  if (isGoed) {
    wachtOpVolgende = true;
    score++;
    scoreEl.textContent = score;

    geklikt.classList.add("correct");
    feedbackEl.textContent = "Goed gedaan! 🎉";
    feedbackEl.className   = "good";

    speelToon("goed");
    startConfetti();

    setTimeout(() => {
      geklikt.classList.remove("correct");
      huidigIndex++;
      toonVraag();
    }, 1200);

  } else {
    geklikt.classList.add("wrong");
    feedbackEl.textContent = "Probeer nog eens 😊";
    feedbackEl.className   = "bad";

    speelToon("fout");

    setTimeout(() => geklikt.classList.remove("wrong"), 500);
  }
}

function toonEindscherm() {
  progressEl.style.width = "100%";

  document.getElementById("image-wrap").style.display = "none";
  document.getElementById("question-text").style.display = "none";
  answersEl.style.display = "none";
  feedbackEl.textContent  = "";
  endScreen.style.display = "flex";

  const totaal = huidigeRonde.length;
  const pct    = Math.round(score / totaal * 100);

  let titel, bericht;
  if (pct === 100) {
    titel   = "Wauw, perfect! 🌟";
    bericht = `Je had alle ${totaal} woordjes goed! Je bent een echte woordenster!`;
    startConfetti(); startConfetti();
  } else if (pct >= 75) {
    titel   = "Super gedaan! 🏆";
    bericht = `${score} van de ${totaal} woordjes goed. Geweldig!`;
  } else if (pct >= 50) {
    titel   = "Goed bezig! 😊";
    bericht = `${score} van de ${totaal} woordjes goed. Blijf oefenen!`;
  } else {
    titel   = "Blijf oefenen! 💪";
    bericht = `${score} van de ${totaal} woordjes goed. Volgende keer beter!`;
  }

  document.getElementById("end-title").textContent = titel;
  document.getElementById("end-msg").textContent   = bericht;

  spreekUit(titel.replace(/[🌟🏆😊💪]/g, ""));
}

/* ── Start ── */
startGame();
</script>
</body>
</html>
